services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/linktrac-db
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongo
    networks:
      - linktrac-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:5000/api
    ports:
      - '5173:5173'
    depends_on:
      - backend
    networks:
      - linktrac-net

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - linktrac-net

volumes:
  mongo-data:

networks:
  linktrac-net:
    driver: bridge
